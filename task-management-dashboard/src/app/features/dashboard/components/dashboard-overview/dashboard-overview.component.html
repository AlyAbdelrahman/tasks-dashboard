<section class="stat-grid" aria-label="Task statistics">
  @for (stat of stats; track stat.label) {
    <mat-card class="stat-card">
      <mat-card-content class="stat-card__content">
        <div class="stat-card__header">
          <span class="stat-card__emoji" aria-hidden="true">{{ stat.emoji }}</span>
          <span class="stat-card__label">{{ stat.label }}</span>
        </div>
        <span class="stat-card__value">{{ stat.value }}</span>
        <span class="stat-card__hint" [ngClass]="'stat-card__hint--' + stat.hintType">
          {{ stat.value }} {{ stat.label | lowercase }}
        </span>
      </mat-card-content>
    </mat-card>
  }
</section>
