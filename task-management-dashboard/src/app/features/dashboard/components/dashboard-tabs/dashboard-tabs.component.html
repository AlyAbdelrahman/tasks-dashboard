<section class="dashboard-tabs" aria-label="Task status filters">
  <nav mat-tab-nav-bar class="dashboard-tabs__list" [tabPanel]="tabPanel" aria-label="Task status tabs">
    @for (tab of tabs; track tab.id) {
      <a
        mat-tab-link
        class="dashboard-tabs__tab"
        [class.dashboard-tabs__tab--active]="tab.id === activeTab"
        [active]="tab.id === activeTab"
        (click)="setActiveTab(tab.id)"
      >
        {{ tab.label }}
      </a>
    }
  </nav>

  <div>
  <div class="dashboard-tabs__actions">
    <button
      mat-stroked-button
      type="button"
      class="dashboard-tabs__priority"
      (click)="togglePrioritySort()"
    >
      {{ priorityButtonLabel }}
    </button>
    <button mat-flat-button type="button" class="dashboard-tabs__new-task" (click)="openNewTaskModal()">+ New Task</button>
  </div>

  <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
  </div>
</section>

<app-task-status-board [selectedTab]="activeTab"></app-task-status-board>
