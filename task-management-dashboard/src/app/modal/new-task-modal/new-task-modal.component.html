<h2 mat-dialog-title>{{ isEditMode ? 'Edit Task' : 'New Task' }}</h2>

<mat-dialog-content class="new-task-modal__content">
  <form [formGroup]="form" class="new-task-modal__form">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" maxlength="100" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="280"></textarea>
    </mat-form-field>

    <div class="new-task-modal__row">
      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          @for (status of statuses; track status.value) {
            <mat-option [value]="status.value">{{ status.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Priority</mat-label>
        <mat-select formControlName="priority">
          @for (priority of priorities; track priority.value) {
            <mat-option [value]="priority.value">{{ priority.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="new-task-modal__row">
      <mat-form-field appearance="outline">
        <mat-label>Assignee</mat-label>
        <input matInput formControlName="assignee" maxlength="40" placeholder="@Sarah" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Initials</mat-label>
        <input matInput formControlName="assigneeInitials" maxlength="3" placeholder="SS" />
      </mat-form-field>
    </div>

    <div class="new-task-modal__row">
      <mat-form-field appearance="outline">
        <mat-label>Timeline</mat-label>
        <input matInput formControlName="timeline" maxlength="60" placeholder="Due in 3 days" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <input matInput formControlName="category" maxlength="60" placeholder="Backend" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if (isEditMode) {
    <button mat-stroked-button color="warn" type="button" (click)="deleteTask()">Delete</button>
  }
  <button mat-stroked-button type="button" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">
    {{ isEditMode ? 'Save Changes' : 'Create Task' }}
  </button>
</mat-dialog-actions>
